version: "3.8"

services:
  bot:
    build: .
    container_name: cep-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount Firebase credentials file
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    environment:
      - FIREBASE_CREDENTIALS=/app/firebase-credentials.json
